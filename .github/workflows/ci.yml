name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run python -m pytest tests -q

  public-bundle:
    name: Public Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Rebuild public NovaMind bundle
        run: uv run python scripts/build_public.py

      - name: Verify rebuilt NovaMind CLI starts
        run: python public/novamind-operation --help

      - name: Verify public docs are up to date
        run: git diff --exit-code -- public/docs public/README.md public/requirements.txt
